<!DOCTYPE html>
<html>
<head>
    <title>文档智能处理系统</title>
</head>
<body>
    <h1>上传文档并输入指令</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <input type="text" name="command" placeholder="比如：提取所有人名" size="50" required>
        <br><br>
        <button type="submit">提交</button>
    </form>
</body>
</html>
