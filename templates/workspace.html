<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocPilot · 智能文档工作区</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/workspace.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo img {
            height: 32px;
            width: auto;
        }
        /* 仅新增：进度条样式 */
        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 99px;
            overflow: hidden;
            margin: 12px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.3s ease;
            border-radius: 99px;
        }
        .progress-text {
            font-size: 13px;
            color: var(--text-secondary);
            display: none;
        }
    </style>
</head>
<body>
    <!-- ========== 顶部导航栏 ========== -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <img src="logo.png" alt="DocPilot Logo">
                Doc<span>Pilot</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="#" class="nav-link" id="featuresLink">功能</a>
                <a href="#" class="nav-link" id="pricingLink">订阅企业版</a>
            </div>
            <div class="nav-buttons">
                <button class="theme-toggle-nav" id="themeToggleNav">
                    <i data-lucide="moon" id="themeIconNav"></i>
                </button>
                <button class="btn-outline" id="loginBtn">登录</button>
                <button class="btn-primary" id="backToHomeBtn">返回首页</button>
            </div>
        </div>
    </nav>

    <div class="workspace-container">
        <div class="workspace-header">
            <div class="workspace-title">
                <i data-lucide="briefcase" style="width: 24px; height: 24px; vertical-align: middle; margin-right: 8px;"></i>
                智能文档工作区
            </div>
            <div class="workspace-divider"></div>
            <div class="workspace-actions">
                <button class="history-toggle-btn" id="historyToggleBtn">
                    <i data-lucide="clock" style="width: 14px; height: 14px;"></i>
                    历史文档
                    <span class="history-badge-small" id="historyBadge">0</span>
                </button>
            </div>
        </div>
        
        <!-- ========== 【新增】文档处理进度条 ========== -->
        <div class="progress-text" id="progressText">准备就绪</div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-section">
            <div class="file-drop-area" id="workspaceDropArea">
                <input type="file" id="globalFileInput" multiple accept=".txt,.docx,.md,.xlsx,.pdf" class="file-input">
                <div style="font-size: 48px; margin-bottom: 12px;">
                    <i data-lucide="upload-cloud" style="width: 48px; height: 48px;"></i>
                </div>
                <div>点击或拖拽文件至此区域上传</div>
                <div style="font-size: 12px; color: var(--text-placeholder); margin-top: 8px;">支持 .txt, .docx, .md, .xlsx, .pdf</div>
            </div>
            <div id="globalFileList" class="file-list-container hidden">
                <div class="file-list-header">
                    <span>
                        <i data-lucide="files" style="width: 14px; height: 14px; margin-right: 6px;"></i>
                        已选文件 (<span id="globalFileCount">0</span>)
                    </span>
                    <button class="file-remove" id="clearAllFiles" style="color: var(--danger);">
                        <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
                    </button>
                </div>
                <div id="globalFileListBody" class="file-list"></div>
            </div>
        </div>

        <div class="functions-header">
            <div class="functions-title">选择处理功能</div>
        </div>

        <!-- 功能选择 -->
        <div class="functions-grid">
            <div class="function-card" data-function="extract">
                <div class="function-icon"><i data-lucide="file-search"></i></div>
                <div class="function-title">智能提取</div>
            </div>
            <div class="function-card" data-function="fill">
                <div class="function-icon"><i data-lucide="table"></i></div>
                <div class="function-title">表格填写</div>
            </div>
            <div class="function-card" data-function="format">
                <div class="function-icon"><i data-lucide="paintbrush"></i></div>
                <div class="function-title">格式调整</div>
            </div>
            <div class="function-card" data-function="qa">
                <div class="function-icon"><i data-lucide="message-circle"></i></div>
                <div class="function-title">智能问答</div>
            </div>
            <div class="function-card" data-function="analyze">
                <div class="function-icon"><i data-lucide="bar-chart-3"></i></div>
                <div class="function-title">文档分析</div>
            </div>
        </div>

        <!-- 历史侧边栏 -->
        <div class="history-sidebar" id="historySidebar">
            <div class="history-sidebar-header">
                <div class="history-sidebar-title">
                    <i data-lucide="clock"></i>
                    历史文档
                    <span class="history-badge" id="historyCount">0</span>
                </div>
                <button class="history-sidebar-close" id="historySidebarClose">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="history-search">
                <i data-lucide="search"></i>
                <input type="text" id="historySearchInput" placeholder="搜索历史文档...">
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">
                    <i data-lucide="archive"></i>
                    <p>暂无历史文档</p>
                    <small>上传文档后会自动保存</small>
                </div>
            </div>
            <div class="history-sidebar-footer" id="historyFooter" style="display: none;">
                <label class="history-select-all">
                    <input type="checkbox" id="selectAllHistory"> 全选
                </label>
                <div class="history-footer-actions">
                    <button class="history-action-btn" id="importSelectedBtn">
                        <i data-lucide="import"></i>
                        导入选中 (<span id="selectedCount">0</span>)
                    </button>
                    <button class="history-action-btn danger" id="deleteSelectedBtn">
                        <i data-lucide="trash-2"></i>
                        删除
                    </button>
                </div>
            </div>
        </div>
        
        <div class="history-overlay" id="historyOverlay"></div>

        <!-- 结果区域 -->
        <div class="result-section">
            <div class="result-header">
                <span id="resultTitle">
                    <i data-lucide="clipboard-list" style="width: 18px; height: 18px; margin-right: 6px;"></i>
                    执行结果
                </span>
                <div id="resultActions"></div>
            </div>
            <div id="resultContent">
                <div style="text-align: center; padding: 60px; color: var(--text-placeholder);">
                    <i data-lucide="folder-open" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i><br>
                    请先上传文档，然后选择一个功能
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/common.js"></script>
    <script src="/static/js/modules/fileManager.js"></script>
    <script src="/static/js/workspace.js"></script>
    <script>
        lucide.createIcons();
        
        // 进度条元素
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        // 显示进度
        function showProgress(percent, text) {
            progressContainer.style.display = 'block';
            progressText.style.display = 'block';
            progressBar.style.width = percent + '%';
            progressText.textContent = text;
        }
        
        // 隐藏进度
        function hideProgress() {
            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressText.style.display = 'none';
            }, 800);
        }
        
        // 绑定导航
        document.getElementById('backToHomeBtn')?.addEventListener('click', () => {
            window.location.href = '/';
        });
        
        document.getElementById('loginBtn')?.addEventListener('click', () => {
            alert('演示模式：登录功能即将开放');
        });
        
        document.getElementById('featuresLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/#features';
        });
        
        document.getElementById('pricingLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            alert('订阅信息即将公布');
        });
        
        // 文件上传触发进度
        document.getElementById('globalFileInput')?.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                showProgress(35, '文档上传中...');
                setTimeout(() => showProgress(100, '上传完成'), 600);
                setTimeout(hideProgress, 1400);
            }
        });
        
        // 功能处理触发进度
        document.querySelectorAll('.function-card').forEach(card => {
            card.addEventListener('click', () => {
                const title = card.querySelector('.function-title').textContent;
                showProgress(40, `正在${title}...`);
                setTimeout(() => showProgress(70, '生成结果中...'), 500);
                setTimeout(() => showProgress(100, '处理完成'), 1000);
                setTimeout(hideProgress, 1800);
                
                document.getElementById('resultTitle').innerHTML = `
                    <i data-lucide="clipboard-list"></i> ${title} 结果
                `;
                document.getElementById('resultContent').innerHTML = `
                    <div style="text-align:center;padding:60px;color:var(--text-placeholder)">
                        <i data-lucide="check-circle" style="width:48px;height:48px;margin-bottom:16px;color:var(--success);opacity:0.8"></i><br>
                        ${title} 处理完成
                    </div>
                `;
                lucide.createIcons();
            });
        });
    </script>
</body>
</html>
